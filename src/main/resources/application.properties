# =========================================================
# APPLICATION
# =========================================================
spring.application.name=gym-management-system
server.port=${PORT:8080}

# =========================================================
# MONGODB CONNECTION
# =========================================================
# Locally this falls back to your own MongoDB. When deployed, set the
# MONGODB_URI environment variable on your hosting platform (e.g. your
# MongoDB Atlas connection string) and it overrides this automatically.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/fitcore_db}

# =========================================================
# JWT CONFIGURATION
# =========================================================
# Set JWT_SECRET as an environment variable in production — never leave the
# default below in place once this is deployed publicly.
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyToASecureRandomValueOfAtLeast256BitsForProduction}
jwt.expiration.ms=86400000
jwt.refresh-expiration.ms=604800000

# =========================================================
# FILE UPLOAD
# =========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/profile-images

# =========================================================
# AUTO-PROVISIONED LOGIN ACCOUNTS
# =========================================================
# When a Member or Trainer record is created, a matching login account is
# auto-created using their generated code (e.g. GYM-2026-12345) as the
# Login ID, and the password below. Share this with them so they can log
# in and change it (via Forgot Password) on first use.
app.default-member-password=Member@123
app.default-trainer-password=Trainer@123

# =========================================================
# UPI PAYMENTS (QR code shown at checkout)
# =========================================================
app.upi.id=${UPI_ID:hrithikeshmathan-1@okicici}
app.upi.payee-name=${UPI_PAYEE_NAME:Hrithi Kesh}
app.upi.currency=INR

# =========================================================
# LOGGING
# =========================================================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO
logging.level.com.gymmanagement=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %5p - [%thread] %logger{36} - %msg%n

# =========================================================
# SWAGGER / OPENAPI
# =========================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =========================================================
# JACKSON
# =========================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
