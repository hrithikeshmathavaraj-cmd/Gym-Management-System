<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>
    <div class="page-body">

      <div class="row g-3">
        <div class="col-lg-7">
          <div class="card-glass p-4">
            <h6 class="mb-3" style="font-weight:600;">Gym Information</h6>
            <form id="settingsForm">
              <div class="mb-3">
                <label class="form-label">Gym name</label>
                <input type="text" class="form-control" id="gymName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="gymAddress">
              </div>
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label">Contact number</label>
                  <input type="text" class="form-control" id="gymContact">
                </div>
                <div class="col-6">
                  <label class="form-label">Contact email</label>
                  <input type="email" class="form-control" id="gymEmail">
                </div>
              </div>
              <div class="mb-3 mt-3">
                <label class="form-label">Expiry reminder threshold (days before expiry)</label>
                <input type="number" class="form-control" id="expiryReminderDays" min="1" max="60">
              </div>
              <button type="submit" class="btn btn-gradient ripple" id="saveSettingsBtn">Save Settings</button>
            </form>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card-glass p-4">
            <h6 class="mb-3" style="font-weight:600;">Appearance</h6>
            <div class="d-flex justify-content-between align-items-center p-3 rounded-3" style="border:1px solid var(--border);">
              <div>
                <div style="font-weight:600; font-size:0.9rem;">Dark mode</div>
                <div class="text-secondary" style="font-size:0.8rem;">Toggle the interface theme</div>
              </div>
              <button class="btn btn-ghost ripple" onclick="ThemeManager.toggle()">
                <span class="material-symbols-outlined theme-toggle-icon">dark_mode</span>
              </button>
            </div>
            <p class="text-secondary mt-3" style="font-size:0.78rem;">This setting is saved to your browser only. Only Admins can edit gym-wide settings on the left.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('settings');

  async function loadSettings() {
    try {
      const res = await Api.get('/admin/settings');
      const s = res.data;
      document.getElementById('gymName').value = s.gymName || '';
      document.getElementById('gymAddress').value = s.gymAddress || '';
      document.getElementById('gymContact').value = s.gymContact || '';
      document.getElementById('gymEmail').value = s.gymEmail || '';
      document.getElementById('expiryReminderDays').value = s.expiryReminderDays || 7;
    } catch (err) {
      Toast.show(err.message || 'Failed to load settings (Admin access required)', 'error');
    }
  }

  document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      gymName: document.getElementById('gymName').value.trim(),
      gymAddress: document.getElementById('gymAddress').value.trim(),
      gymContact: document.getElementById('gymContact').value.trim(),
      gymEmail: document.getElementById('gymEmail').value.trim(),
      expiryReminderDays: parseInt(document.getElementById('expiryReminderDays').value || 7, 10)
    };
    const btn = document.getElementById('saveSettingsBtn');
    btn.disabled = true;
    try {
      await Api.put('/admin/settings', payload);
      Toast.show('Settings saved', 'success');
    } catch (err) {
      Toast.show(err.message || 'Failed to save settings', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  loadSettings();
</script>
</body>
</html>
