<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<script src="js/chart.umd.min.js"></script>
<script src="js/sockjs.min.js"></script>
<script src="js/stomp.min.js"></script>
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>

  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>

    <div class="page-body">

      <!-- Stat Cards -->
      <div class="d-flex align-items-center gap-2 mb-3">
        <span class="chip chip-active" id="liveStatusChip">
          <span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">sensors</span> Connecting...
        </span>
      </div>
      <div class="row g-3 mb-4" id="statCardsRow">
        <!-- skeleton placeholders, replaced by JS -->
        <div class="col-6 col-lg-3"><div class="card-glass stat-card"><div class="skeleton" style="height:80px;"></div></div></div>
        <div class="col-6 col-lg-3"><div class="card-glass stat-card"><div class="skeleton" style="height:80px;"></div></div></div>
        <div class="col-6 col-lg-3"><div class="card-glass stat-card"><div class="skeleton" style="height:80px;"></div></div></div>
        <div class="col-6 col-lg-3"><div class="card-glass stat-card"><div class="skeleton" style="height:80px;"></div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-8">
          <div class="card-glass p-4 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="mb-0" style="font-weight:600;">Revenue — Last 6 Months</h6>
            </div>
            <canvas id="revenueChart" height="90"></canvas>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card-glass p-4 h-100">
            <h6 class="mb-3" style="font-weight:600;">Membership Distribution</h6>
            <canvas id="planChart" height="200"></canvas>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-5">
          <div class="card-glass p-4 h-100">
            <h6 class="mb-3" style="font-weight:600;">Attendance — Last 7 Days</h6>
            <canvas id="attendanceChart" height="180"></canvas>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card-glass p-4 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="mb-0" style="font-weight:600;">
                <span class="material-symbols-outlined align-middle" style="font-size:18px; color:var(--success);">call_received</span>
                Payments Received <span class="text-secondary" style="font-weight:400; font-size:0.78rem;">(from members)</span>
              </h6>
              <a href="/payments.html" class="btn btn-ghost btn-sm ripple">View all</a>
            </div>
            <div class="table-responsive">
              <table class="table-modern">
                <thead><tr><th>Member</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th></tr></thead>
                <tbody id="recentPaymentsBody">
                  <tr><td colspan="5"><div class="skeleton" style="height:20px;"></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-12">
          <div class="card-glass p-4 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="mb-0" style="font-weight:600;">
                <span class="material-symbols-outlined align-middle" style="font-size:18px; color:var(--danger);">call_made</span>
                Payments Sent <span class="text-secondary" style="font-weight:400; font-size:0.78rem;">(trainer salary)</span>
              </h6>
              <a href="/trainers.html" class="btn btn-ghost btn-sm ripple">Pay a trainer</a>
            </div>
            <div class="table-responsive">
              <table class="table-modern">
                <thead><tr><th>Trainer</th><th>Amount</th><th>Month</th><th>Method</th><th>Status</th><th>Paid On</th></tr></thead>
                <tbody id="recentSalaryBody">
                  <tr><td colspan="6"><div class="skeleton" style="height:20px;"></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('dashboard');

  const chipClass = (status) => ({
    SUCCESS: 'chip-active', PENDING: 'chip-suspended', FAILED: 'chip-expired', REFUNDED: 'chip-cancelled'
  }[status] || 'chip-cancelled');

  let revenueChart, planChart, attendanceChart;

  function statCard(icon, label, value, color, deltaLabel, deltaUp) {
    return `
      <div class="col-6 col-lg-3">
        <div class="card-glass stat-card">
          <div class="stat-icon" style="background:${color}22;">
            <span class="material-symbols-outlined" style="color:${color};">${icon}</span>
          </div>
          <div class="stat-value">${value}</div>
          <div class="stat-label">${label}</div>
          ${deltaLabel ? `<span class="stat-delta ${deltaUp ? 'up' : 'down'}"><span class="material-symbols-outlined" style="font-size:14px;">${deltaUp ? 'trending_up' : 'trending_down'}</span>${deltaLabel}</span>` : ''}
        </div>
      </div>`;
  }

  function renderDashboard(d) {
    document.getElementById('statCardsRow').innerHTML =
      statCard('group', 'Total Members', d.totalMembers, '#2563EB', `${d.activeMembers} active`, true) +
      statCard('event_available', "Today's Attendance", d.todaysAttendance, '#38BDF8', null, true) +
      statCard('payments', 'Total Revenue', '₹' + d.totalRevenue.toLocaleString(), '#22C55E', '₹' + d.monthlyRevenue.toLocaleString() + ' this month', true) +
      statCard('warning', 'Expired Members', d.expiredMembers, '#EF4444', null, false);

    const revLabels = Object.keys(d.monthlyRevenueChart);
    const revValues = Object.values(d.monthlyRevenueChart);
    const planLabels = Object.keys(d.membershipDistribution);
    const planValues = Object.values(d.membershipDistribution);
    const attLabels = Object.keys(d.attendanceChart);
    const attValues = Object.values(d.attendanceChart);

    if (!revenueChart) {
      revenueChart = new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: { labels: revLabels, datasets: [{ label: 'Revenue', data: revValues, borderColor: '#2563EB', backgroundColor: 'rgba(37,99,235,0.12)', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#38BDF8' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } }, animation: { duration: 400 } }
      });
    } else {
      revenueChart.data.labels = revLabels;
      revenueChart.data.datasets[0].data = revValues;
      revenueChart.update();
    }

    if (!planChart) {
      planChart = new Chart(document.getElementById('planChart'), {
        type: 'doughnut',
        data: { labels: planLabels, datasets: [{ data: planValues, backgroundColor: ['#2563EB', '#38BDF8', '#22C55E', '#F59E0B', '#EF4444', '#0F172A'] }] },
        options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } }, animation: { duration: 400 } }
      });
    } else {
      planChart.data.labels = planLabels;
      planChart.data.datasets[0].data = planValues;
      planChart.update();
    }

    if (!attendanceChart) {
      attendanceChart = new Chart(document.getElementById('attendanceChart'), {
        type: 'bar',
        data: { labels: attLabels, datasets: [{ label: 'Check-ins', data: attValues, backgroundColor: '#38BDF8', borderRadius: 6 }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } }, animation: { duration: 400 } }
      });
    } else {
      attendanceChart.data.labels = attLabels;
      attendanceChart.data.datasets[0].data = attValues;
      attendanceChart.update();
    }

    const tbody = document.getElementById('recentPaymentsBody');
    if (!d.recentPayments || d.recentPayments.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-secondary py-4">No payments recorded yet</td></tr>';
    } else {
      tbody.innerHTML = d.recentPayments.map(p => `
        <tr>
          <td>${p.memberName}</td>
          <td>₹${p.amount.toLocaleString()}</td>
          <td>${p.paymentMethod}</td>
          <td><span class="chip ${chipClass(p.status)}">${p.status}</span></td>
          <td>${new Date(p.paymentDate).toLocaleDateString()}</td>
        </tr>`).join('');
    }
  }

  async function loadDashboard() {
    try {
      const res = await Api.get('/reports/dashboard');
      renderDashboard(res.data);
    } catch (err) {
      Toast.show(err.message || 'Failed to load dashboard', 'error');
    }
  }

  const salaryChipClass = (status) => status === 'PAID' ? 'chip-active' : 'chip-suspended';

  async function loadRecentSalary() {
    const tbody = document.getElementById('recentSalaryBody');
    try {
      const res = await Api.get('/salary');
      const payments = (res.data || []).slice(0, 8);
      if (payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">No salary payments made yet</td></tr>';
      } else {
        tbody.innerHTML = payments.map(p => `
          <tr>
            <td style="font-weight:600;">${p.trainerName}</td>
            <td>₹${p.amount.toLocaleString()}</td>
            <td>${p.month}</td>
            <td>${p.method || '—'}</td>
            <td><span class="chip ${salaryChipClass(p.status)}">${p.status}</span></td>
            <td>${new Date(p.paymentDate).toLocaleDateString()}</td>
          </tr>`).join('');
      }
    } catch (err) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">Could not load salary payments</td></tr>';
    }
  }

  function setLiveStatus(connected) {
    const chip = document.getElementById('liveStatusChip');
    if (connected) {
      chip.className = 'chip chip-active';
      chip.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">sensors</span> Live — updates in real time';
    } else {
      chip.className = 'chip chip-suspended';
      chip.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">sensors_off</span> Reconnecting...';
    }
  }

  /* =========================================================
     REAL-TIME: subscribe to /topic/dashboard over WebSocket.
     Every payment, check-in, or member change anywhere in the
     app pushes a fresh snapshot here — no manual refresh needed.
     Falls back to 20s polling if the socket can't connect.
     ========================================================= */
  let pollTimer = null;

  function connectRealtime() {
    try {
      const socket = new SockJS('/ws');
      const stompClient = Stomp.over(socket);
      stompClient.debug = null; // silence verbose console logging

      stompClient.connect({}, () => {
        setLiveStatus(true);
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

        stompClient.subscribe('/topic/dashboard', (message) => {
          const event = JSON.parse(message.body);
          renderDashboard(event.stats);
        });
      }, () => {
        setLiveStatus(false);
        startPollingFallback();
        setTimeout(connectRealtime, 4000);
      });
    } catch (e) {
      setLiveStatus(false);
      startPollingFallback();
    }
  }

  function startPollingFallback() {
    if (pollTimer) return;
    pollTimer = setInterval(loadDashboard, 20000);
  }

  loadDashboard();
  connectRealtime();
</script>
</body>
</html>
