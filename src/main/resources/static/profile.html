<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>
    <div class="page-body">

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card-glass p-4 text-center">
            <div class="avatar mx-auto mb-3" id="profileAvatar" style="width:88px; height:88px; font-size:1.8rem;"></div>
            <h6 style="font-weight:700;" id="profileName">—</h6>
            <p class="text-secondary mb-2" style="font-size:0.85rem;" id="profileEmail">—</p>
            <span class="chip chip-active" id="profileRole">—</span>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card-glass p-4">
            <h6 class="mb-3" style="font-weight:600;">Edit Profile</h6>
            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label">Full name</label>
                <input type="text" class="form-control" id="editName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Login ID</label>
                <input type="text" class="form-control" id="editEmail" disabled>
                <div class="text-secondary mt-1" style="font-size:0.76rem;">Login ID cannot be changed here — contact an administrator.</div>
              </div>
              <button type="submit" class="btn btn-gradient ripple" id="saveProfileBtn">Save Changes</button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('profile');

  function initials(name) { return (name || 'U').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase(); }

  async function loadProfile() {
    try {
      const res = await Api.get('/profile');
      const u = res.data;
      document.getElementById('profileAvatar').textContent = initials(u.name);
      document.getElementById('profileName').textContent = u.name;
      document.getElementById('profileEmail').textContent = u.username;
      document.getElementById('profileRole').textContent = u.role;
      document.getElementById('editName').value = u.name;
      document.getElementById('editEmail').value = u.username;
    } catch (err) {
      Toast.show(err.message || 'Failed to load profile', 'error');
    }
  }

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveProfileBtn');
    btn.disabled = true;
    try {
      const res = await Api.put('/profile', { name: document.getElementById('editName').value.trim() });
      const stored = Api.getUser();
      stored.name = res.data.name;
      localStorage.setItem('gym_user', JSON.stringify(stored));
      Toast.show('Profile updated', 'success');
      loadProfile();
    } catch (err) {
      Toast.show(err.message || 'Failed to update profile', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  loadProfile();
</script>
</body>
</html>
