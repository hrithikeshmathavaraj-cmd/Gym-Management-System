<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>

  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>

    <div class="page-body">

      <div class="row g-3 mb-4">
        <div class="col-lg-8">
          <div class="card-glass p-4 h-100">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
              <div>
                <h5 class="mb-1" id="welcomeName" style="font-weight:700;">Welcome back</h5>
                <div class="text-secondary" style="font-size:0.85rem;" id="trainerCodeLine">&nbsp;</div>
              </div>
            </div>
            <div class="row g-3 mt-2">
              <div class="col-6 col-md-4">
                <div class="text-secondary" style="font-size:0.75rem;">Specialization</div>
                <div style="font-weight:600;" id="specialization">—</div>
              </div>
              <div class="col-6 col-md-4">
                <div class="text-secondary" style="font-size:0.75rem;">Experience</div>
                <div style="font-weight:600;" id="experience">—</div>
              </div>
              <div class="col-6 col-md-4">
                <div class="text-secondary" style="font-size:0.75rem;">Phone</div>
                <div style="font-weight:600;" id="trainerPhone">—</div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card-glass p-4 h-100 text-center d-flex flex-column justify-content-center">
            <div class="text-secondary" style="font-size:0.8rem;">Total Salary Received</div>
            <div style="font-size:2rem; font-weight:700;" id="totalSalary">₹0</div>
            <div class="text-secondary" style="font-size:0.78rem;" id="salaryCountLine">0 payments on record</div>
          </div>
        </div>
      </div>

      <div class="card-glass p-4">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h6 class="mb-0" style="font-weight:600;">My Salary History</h6>
        </div>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Month</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
                <th>Payment Date</th>
                <th>Payslip</th>
              </tr>
            </thead>
            <tbody id="salaryBody">
              <tr><td colspan="6" class="text-secondary text-center py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('dashboard');

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatMoney(n) {
    return '₹' + Number(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  async function loadTrainerDashboard() {
    try {
      const trainerRes = await Api.get('/trainers/me');
      const trainer = trainerRes.data;

      document.getElementById('welcomeName').textContent = `Welcome back, ${trainer.name}`;
      document.getElementById('trainerCodeLine').textContent = `Trainer Code: ${trainer.trainerCode}`;
      document.getElementById('specialization').textContent = trainer.specialization || '—';
      document.getElementById('experience').textContent = trainer.experience ? `${trainer.experience} yrs` : '—';
      document.getElementById('trainerPhone').textContent = trainer.phone || '—';

      const salaryRes = await Api.get('/salary/me');
      const payments = salaryRes.data || [];

      const total = payments
        .filter(p => p.status === 'PAID')
        .reduce((sum, p) => sum + Number(p.amount || 0), 0);
      document.getElementById('totalSalary').textContent = formatMoney(total);
      document.getElementById('salaryCountLine').textContent = `${payments.length} payment${payments.length === 1 ? '' : 's'} on record`;

      const tbody = document.getElementById('salaryBody');
      if (payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-secondary text-center py-4">No salary payments yet</td></tr>';
      } else {
        tbody.innerHTML = payments
          .sort((a, b) => new Date(b.paymentDate) - new Date(a.paymentDate))
          .map(p => `
            <tr>
              <td>${p.month}</td>
              <td>${formatMoney(p.amount)}</td>
              <td>${p.method || '—'}</td>
              <td><span class="chip ${p.status === 'PAID' ? 'chip-active' : 'chip-suspended'}">${p.status}</span></td>
              <td>${formatDate(p.paymentDate)}</td>
              <td>
                <button type="button" class="btn btn-ghost btn-sm ripple" onclick="downloadFile('/api/reports/export/salary/${p.id}/slip','salary-slip-${p.month}.pdf')">
                  <span class="material-symbols-outlined" style="font-size:16px; vertical-align:middle;">download</span> PDF
                </button>
              </td>
            </tr>
          `).join('');
      }
    } catch (err) {
      Toast.show(err.message || 'Failed to load dashboard', 'error');
    }
  }

  loadTrainerDashboard();
</script>
</body>
</html>
