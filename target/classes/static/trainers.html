<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainers · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>
    <div class="page-body">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h5 class="mb-0" style="font-weight:600;">Trainers</h5>
          <p class="mb-0" style="color:var(--text-secondary); font-size:0.86rem;">Manage your gym's training staff</p>
        </div>
        <button class="btn btn-gradient ripple" data-bs-toggle="modal" data-bs-target="#trainerModal" onclick="openCreateModal()">
          <span class="material-symbols-outlined align-middle" style="font-size:18px;">add</span> Add Trainer
        </button>
      </div>

      <div class="row g-3" id="trainersGrid">
        <div class="col-md-4"><div class="card-glass p-4"><div class="skeleton" style="height:160px;"></div></div></div>
        <div class="col-md-4"><div class="card-glass p-4"><div class="skeleton" style="height:160px;"></div></div></div>
        <div class="col-md-4"><div class="card-glass p-4"><div class="skeleton" style="height:160px;"></div></div></div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="trainerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="trainerModalTitle" style="font-weight:600;">Add Trainer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="trainerForm">
        <div class="modal-body">
          <input type="hidden" id="trainerId">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input type="text" class="form-control" id="name" required>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone">
            </div>
            <div class="col-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email">
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">Specialization</label>
            <input type="text" class="form-control" id="specialization" placeholder="e.g. Strength & Conditioning">
          </div>
          <div class="row g-3 mt-1">
            <div class="col-6">
              <label class="form-label">Experience (years)</label>
              <input type="number" class="form-control" id="experience" min="0">
            </div>
            <div class="col-6">
              <label class="form-label">Salary (₹)</label>
              <input type="number" class="form-control" id="salary" min="0">
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-gradient ripple" id="saveTrainerBtn">Save Trainer</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="passwordModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" style="font-weight:600;">Reset Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="passwordTargetId">
        <label class="form-label">New password</label>
        <input type="password" class="form-control" id="newPassword" minlength="4" required>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-gradient ripple" id="savePasswordBtn">Save Password</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="salaryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" style="font-weight:600;">Pay Salary</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="salaryForm">
        <div class="modal-body">
          <input type="hidden" id="salaryTrainerId">
          <div class="mb-3">
            <label class="form-label">Trainer</label>
            <input type="text" class="form-control" id="salaryTrainerName" disabled>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Month</label>
              <input type="month" class="form-control" id="salaryMonth" required>
            </div>
            <div class="col-6">
              <label class="form-label">Amount (₹)</label>
              <input type="number" class="form-control" id="salaryAmount" min="1" required>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">Payment Method</label>
            <select class="form-select" id="salaryMethod">
              <option value="BANK_TRANSFER">Bank Transfer</option>
              <option value="UPI">UPI</option>
              <option value="CASH">Cash</option>
            </select>
          </div>
          <div class="mt-3">
            <label class="form-label">Notes (optional)</label>
            <input type="text" class="form-control" id="salaryNotes" placeholder="e.g. Includes performance bonus">
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-gradient ripple" id="saveSalaryBtn">Pay Salary</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('trainers');

  function initials(name) { return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase(); }

  async function loadTrainers() {
    const grid = document.getElementById('trainersGrid');
    try {
      const res = await Api.get('/trainers');
      const trainers = res.data;
      if (!trainers.length) {
        grid.innerHTML = '<div class="col-12"><div class="card-glass p-5 text-center text-secondary">No trainers added yet.</div></div>';
        return;
      }
      grid.innerHTML = trainers.map(t => `
        <div class="col-md-4">
          <div class="card-glass p-4 h-100">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="avatar" style="width:52px;height:52px;font-size:1.1rem;">${initials(t.name)}</div>
              <div class="d-flex gap-1">
                <button class="btn btn-ghost btn-sm ripple" onclick='editTrainer(${JSON.stringify(t)})'>
                  <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
                </button>
                <button class="btn btn-ghost btn-sm ripple" onclick="openPasswordModal('${t.id}')">
                  <span class="material-symbols-outlined" style="font-size:16px;">lock_reset</span>
                </button>
                <button class="btn btn-ghost btn-sm ripple" onclick='openSalaryModal(${JSON.stringify(t)})' title="Pay Salary">
                  <span class="material-symbols-outlined" style="font-size:16px; color:var(--success);">payments</span>
                </button>
                <button class="btn btn-ghost btn-sm ripple" onclick="deleteTrainer('${t.id}')">
                  <span class="material-symbols-outlined" style="font-size:16px; color:var(--danger);">delete</span>
                </button>
              </div>
            </div>
            <h6 style="font-weight:700;">${t.name}</h6>
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="chip chip-active">${t.trainerCode || '—'}</span>
              <span class="chip ${t.available !== false ? 'chip-active' : 'chip-suspended'}" style="cursor:pointer;" onclick="toggleTrainerAvailability('${t.id}', ${t.available === false})" title="Click to toggle">
                <span class="material-symbols-outlined" style="font-size:13px; vertical-align:middle;">${t.available !== false ? 'check_circle' : 'do_not_disturb_on'}</span>
                ${t.available !== false ? 'Available' : 'Unavailable'}
              </span>
            </div>
            <p class="text-secondary mb-2" style="font-size:0.82rem;">${t.specialization || 'General Trainer'}</p>
            <div class="d-flex justify-content-between" style="font-size:0.8rem;">
              <span class="text-secondary">${t.experience || 0} yrs experience</span>
              <span style="font-weight:600;">₹${(t.salary || 0).toLocaleString()}/mo</span>
            </div>
            <hr style="border-color:var(--border);">
            <div style="font-size:0.78rem; color:var(--text-secondary);">
              <div>${t.phone || '—'}</div>
              <div>${t.email || '—'}</div>
            </div>
          </div>
        </div>`).join('');
    } catch (err) {
      Toast.show(err.message || 'Failed to load trainers', 'error');
    }
  }

  function openCreateModal() {
    document.getElementById('trainerModalTitle').textContent = 'Add Trainer';
    document.getElementById('trainerForm').reset();
    document.getElementById('trainerId').value = '';
  }

  function editTrainer(t) {
    document.getElementById('trainerModalTitle').textContent = 'Edit Trainer';
    document.getElementById('trainerId').value = t.id;
    document.getElementById('name').value = t.name;
    document.getElementById('phone').value = t.phone || '';
    document.getElementById('email').value = t.email || '';
    document.getElementById('specialization').value = t.specialization || '';
    document.getElementById('experience').value = t.experience || 0;
    document.getElementById('salary').value = t.salary || 0;
    new bootstrap.Modal(document.getElementById('trainerModal')).show();
  }

  async function deleteTrainer(id) {
    if (!confirm('Remove this trainer?')) return;
    try {
      await Api.del(`/trainers/${id}`);
      Toast.show('Trainer removed', 'success');
      loadTrainers();
    } catch (err) {
      Toast.show(err.message || 'Failed to remove trainer', 'error');
    }
  }

  function openPasswordModal(id) {
    document.getElementById('passwordTargetId').value = id;
    document.getElementById('newPassword').value = '';
    new bootstrap.Modal(document.getElementById('passwordModal')).show();
  }

  document.getElementById('savePasswordBtn').addEventListener('click', async () => {
    const id = document.getElementById('passwordTargetId').value;
    const password = document.getElementById('newPassword').value.trim();
    if (!password) {
      Toast.show('Enter a password', 'error');
      return;
    }

    try {
      await Api.post(`/trainers/${id}/reset-password`, { newPassword: password });
      Toast.show('Password reset for trainer', 'success');
      bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
    } catch (err) {
      Toast.show(err.message || 'Failed to reset password', 'error');
    }
  });

  function currentMonthValue() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }

  async function toggleTrainerAvailability(id, makeAvailable) {
    try {
      await Api.post(`/trainers/${id}/availability?available=${makeAvailable}`, {});
      Toast.show(makeAvailable ? 'Trainer marked available' : 'Trainer marked unavailable', 'success');
      loadTrainers();
    } catch (err) {
      Toast.show(err.message || 'Failed to update availability', 'error');
    }
  }

  function openSalaryModal(trainer) {
    document.getElementById('salaryForm').reset();
    document.getElementById('salaryTrainerId').value = trainer.id;
    document.getElementById('salaryTrainerName').value = trainer.name;
    document.getElementById('salaryMonth').value = currentMonthValue();
    document.getElementById('salaryAmount').value = trainer.salary || '';
    new bootstrap.Modal(document.getElementById('salaryModal')).show();
  }

  document.getElementById('salaryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      trainerId: document.getElementById('salaryTrainerId').value,
      month: document.getElementById('salaryMonth').value,
      amount: parseFloat(document.getElementById('salaryAmount').value),
      method: document.getElementById('salaryMethod').value,
      notes: document.getElementById('salaryNotes').value.trim()
    };
    const btn = document.getElementById('saveSalaryBtn');
    btn.disabled = true;
    try {
      await Api.post('/salary', payload);
      Toast.show('Salary paid — it now shows in the trainer\'s own dashboard and in Reports', 'success');
      bootstrap.Modal.getInstance(document.getElementById('salaryModal')).hide();
    } catch (err) {
      Toast.show(err.message || 'Failed to pay salary', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('trainerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('trainerId').value;
    const payload = {
      name: document.getElementById('name').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      specialization: document.getElementById('specialization').value.trim(),
      experience: parseInt(document.getElementById('experience').value || 0, 10),
      salary: parseFloat(document.getElementById('salary').value || 0)
    };
    const btn = document.getElementById('saveTrainerBtn');
    btn.disabled = true;
    try {
      if (id) {
        await Api.put(`/trainers/${id}`, payload);
        Toast.show('Trainer updated', 'success');
        bootstrap.Modal.getInstance(document.getElementById('trainerModal')).hide();
      } else {
        const res = await Api.post('/trainers', payload);
        bootstrap.Modal.getInstance(document.getElementById('trainerModal')).hide();
        showCredentialsModal('Trainer', res.data.trainerCode, res.message);
      }
      loadTrainers();
    } catch (err) {
      Toast.show(err.message || 'Failed to save trainer', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  loadTrainers();
</script>
</body>
</html>
