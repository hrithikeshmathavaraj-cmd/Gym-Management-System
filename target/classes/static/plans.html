<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Plans · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>
    <div class="page-body">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h5 class="mb-0" style="font-weight:600;">Membership Plans</h5>
          <p class="mb-0" style="color:var(--text-secondary); font-size:0.86rem;">Create and manage the plans members can subscribe to</p>
        </div>
        <button class="btn btn-gradient ripple" data-bs-toggle="modal" data-bs-target="#planModal" onclick="openCreateModal()">
          <span class="material-symbols-outlined align-middle" style="font-size:18px;">add</span> Add Plan
        </button>
      </div>

      <div class="row g-3" id="plansGrid">
        <div class="col-md-4"><div class="card-glass p-4"><div class="skeleton" style="height:140px;"></div></div></div>
        <div class="col-md-4"><div class="card-glass p-4"><div class="skeleton" style="height:140px;"></div></div></div>
        <div class="col-md-4"><div class="card-glass p-4"><div class="skeleton" style="height:140px;"></div></div></div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit Plan Modal -->
<div class="modal fade" id="planModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="planModalTitle" style="font-weight:600;">Add Plan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="planForm">
        <div class="modal-body">
          <input type="hidden" id="planId">
          <div class="mb-3">
            <label class="form-label">Plan name</label>
            <input type="text" class="form-control" id="planName" placeholder="e.g. Quarterly" required>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Duration (days)</label>
              <input type="number" class="form-control" id="duration" min="1" required>
            </div>
            <div class="col-6">
              <label class="form-label">Price (₹)</label>
              <input type="number" class="form-control" id="price" min="0" step="0.01" required>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="2" placeholder="What's included in this plan"></textarea>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-gradient ripple" id="savePlanBtn">Save Plan</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('plans');

  const planIcons = ['bolt', 'workspace_premium', 'diamond', 'military_tech', 'stars', 'auto_awesome'];

  async function loadPlans() {
    const grid = document.getElementById('plansGrid');
    try {
      const res = await Api.get('/plans');
      const plans = res.data;
      if (!plans.length) {
        grid.innerHTML = '<div class="col-12"><div class="card-glass p-5 text-center text-secondary">No plans yet — create your first membership plan.</div></div>';
        return;
      }
      grid.innerHTML = plans.map((p, i) => `
        <div class="col-md-4">
          <div class="card-glass p-4 h-100 d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="stat-icon" style="background:rgba(37,99,235,0.12);">
                <span class="material-symbols-outlined" style="color:var(--secondary);">${planIcons[i % planIcons.length]}</span>
              </div>
              <div class="d-flex gap-1">
                <button class="btn btn-ghost btn-sm ripple" onclick='editPlan(${JSON.stringify(p)})'>
                  <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
                </button>
                <button class="btn btn-ghost btn-sm ripple" onclick="deletePlan('${p.id}')">
                  <span class="material-symbols-outlined" style="font-size:16px; color:var(--danger);">delete</span>
                </button>
              </div>
            </div>
            <h5 style="font-weight:700;">${p.planName}</h5>
            <div class="mb-2"><span style="font-family:'Poppins',sans-serif; font-size:1.6rem; font-weight:700;">₹${p.price.toLocaleString()}</span>
              <span style="color:var(--text-secondary); font-size:0.85rem;"> / ${p.duration} days</span></div>
            <p class="text-secondary flex-grow-1" style="font-size:0.85rem;">${p.description || 'No description provided.'}</p>
            <span class="chip chip-active w-fit">${p.active ? 'Active' : 'Inactive'}</span>
          </div>
        </div>`).join('');
    } catch (err) {
      Toast.show(err.message || 'Failed to load plans', 'error');
    }
  }

  function openCreateModal() {
    document.getElementById('planModalTitle').textContent = 'Add Plan';
    document.getElementById('planForm').reset();
    document.getElementById('planId').value = '';
  }

  function editPlan(p) {
    document.getElementById('planModalTitle').textContent = 'Edit Plan';
    document.getElementById('planId').value = p.id;
    document.getElementById('planName').value = p.planName;
    document.getElementById('duration').value = p.duration;
    document.getElementById('price').value = p.price;
    document.getElementById('description').value = p.description || '';
    new bootstrap.Modal(document.getElementById('planModal')).show();
  }

  async function deletePlan(id) {
    if (!confirm('Delete this plan?')) return;
    try {
      await Api.del(`/plans/${id}`);
      Toast.show('Plan deleted', 'success');
      loadPlans();
    } catch (err) {
      Toast.show(err.message || 'Failed to delete plan (it may be in use)', 'error');
    }
  }

  document.getElementById('planForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('planId').value;
    const payload = {
      planName: document.getElementById('planName').value.trim(),
      duration: parseInt(document.getElementById('duration').value, 10),
      price: parseFloat(document.getElementById('price').value),
      description: document.getElementById('description').value.trim()
    };
    const btn = document.getElementById('savePlanBtn');
    btn.disabled = true;
    try {
      if (id) { await Api.put(`/plans/${id}`, payload); Toast.show('Plan updated', 'success'); }
      else { await Api.post('/plans', payload); Toast.show('Plan created', 'success'); }
      bootstrap.Modal.getInstance(document.getElementById('planModal')).hide();
      loadPlans();
    } catch (err) {
      Toast.show(err.message || 'Failed to save plan', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  loadPlans();
</script>
</body>
</html>
