<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>
    <div class="page-body">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h5 class="mb-0" style="font-weight:600;">Equipment</h5>
          <p class="mb-0" style="color:var(--text-secondary); font-size:0.86rem;">Track inventory, condition, and maintenance schedules</p>
        </div>
        <button class="btn btn-gradient ripple" data-bs-toggle="modal" data-bs-target="#equipmentModal" onclick="openCreateModal()">
          <span class="material-symbols-outlined align-middle" style="font-size:18px;">add</span> Add Equipment
        </button>
      </div>

      <div class="card-glass p-4">
        <div class="table-responsive">
          <table class="table-modern">
            <thead><tr><th>Name</th><th>Purchase Date</th><th>Condition</th><th>Status</th><th>Next Maintenance</th><th></th></tr></thead>
            <tbody id="equipmentBody">
              <tr><td colspan="6"><div class="skeleton" style="height:20px;"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="equipmentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="equipmentModalTitle" style="font-weight:600;">Add Equipment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="equipmentForm">
        <div class="modal-body">
          <input type="hidden" id="equipmentId">
          <div class="mb-3">
            <label class="form-label">Equipment name</label>
            <input type="text" class="form-control" id="name" placeholder="e.g. Treadmill T500" required>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Purchase date</label>
              <input type="date" class="form-control" id="purchaseDate">
            </div>
            <div class="col-6">
              <label class="form-label">Condition</label>
              <select class="form-select" id="condition">
                <option value="NEW">New</option><option value="GOOD">Good</option><option value="FAIR">Fair</option><option value="NEEDS_REPAIR">Needs Repair</option>
              </select>
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-6">
              <label class="form-label">Status</label>
              <select class="form-select" id="status">
                <option value="AVAILABLE">Available</option><option value="IN_USE">In Use</option><option value="UNDER_MAINTENANCE">Under Maintenance</option><option value="RETIRED">Retired</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Next maintenance</label>
              <input type="date" class="form-control" id="maintenanceDate">
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-gradient ripple" id="saveEquipmentBtn">Save Equipment</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('equipment');

  const statusChip = (status) => ({
    AVAILABLE: 'chip-active', IN_USE: 'chip-suspended', UNDER_MAINTENANCE: 'chip-expired', RETIRED: 'chip-cancelled'
  }[status] || 'chip-cancelled');

  async function loadEquipment() {
    const tbody = document.getElementById('equipmentBody');
    try {
      const res = await Api.get('/equipment');
      const items = res.data;
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">No equipment added yet</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(eq => `
        <tr>
          <td style="font-weight:600;">${eq.name}</td>
          <td>${eq.purchaseDate || '—'}</td>
          <td>${eq.condition || '—'}</td>
          <td><span class="chip ${statusChip(eq.status)}">${(eq.status || '').replace('_', ' ')}</span></td>
          <td>${eq.maintenanceDate || '—'}</td>
          <td class="text-end">
            <button class="btn btn-ghost btn-sm ripple" onclick='editEquipment(${JSON.stringify(eq)})'>
              <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
            </button>
            <button class="btn btn-ghost btn-sm ripple" onclick="deleteEquipment('${eq.id}')">
              <span class="material-symbols-outlined" style="font-size:16px; color:var(--danger);">delete</span>
            </button>
          </td>
        </tr>`).join('');
    } catch (err) {
      Toast.show(err.message || 'Failed to load equipment', 'error');
    }
  }

  function openCreateModal() {
    document.getElementById('equipmentModalTitle').textContent = 'Add Equipment';
    document.getElementById('equipmentForm').reset();
    document.getElementById('equipmentId').value = '';
  }

  function editEquipment(eq) {
    document.getElementById('equipmentModalTitle').textContent = 'Edit Equipment';
    document.getElementById('equipmentId').value = eq.id;
    document.getElementById('name').value = eq.name;
    document.getElementById('purchaseDate').value = eq.purchaseDate || '';
    document.getElementById('condition').value = eq.condition || 'NEW';
    document.getElementById('status').value = eq.status || 'AVAILABLE';
    document.getElementById('maintenanceDate').value = eq.maintenanceDate || '';
    new bootstrap.Modal(document.getElementById('equipmentModal')).show();
  }

  async function deleteEquipment(id) {
    if (!confirm('Remove this equipment?')) return;
    try {
      await Api.del(`/equipment/${id}`);
      Toast.show('Equipment removed', 'success');
      loadEquipment();
    } catch (err) {
      Toast.show(err.message || 'Failed to remove equipment', 'error');
    }
  }

  document.getElementById('equipmentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('equipmentId').value;
    const payload = {
      name: document.getElementById('name').value.trim(),
      purchaseDate: document.getElementById('purchaseDate').value || null,
      condition: document.getElementById('condition').value,
      status: document.getElementById('status').value,
      maintenanceDate: document.getElementById('maintenanceDate').value || null
    };
    const btn = document.getElementById('saveEquipmentBtn');
    btn.disabled = true;
    try {
      if (id) { await Api.put(`/equipment/${id}`, payload); Toast.show('Equipment updated', 'success'); }
      else { await Api.post('/equipment', payload); Toast.show('Equipment added', 'success'); }
      bootstrap.Modal.getInstance(document.getElementById('equipmentModal')).hide();
      loadEquipment();
    } catch (err) {
      Toast.show(err.message || 'Failed to save equipment', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  loadEquipment();
</script>
</body>
</html>
