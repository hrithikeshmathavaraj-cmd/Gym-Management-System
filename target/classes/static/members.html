<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Members · FitCore</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/material-symbols.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarRoot"></div>

  <div class="main-content" id="mainContent">
    <div id="topbarRoot"></div>

    <div class="page-body">

      <div class="card-glass p-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
          <div class="d-flex align-items-center gap-2" style="max-width:340px; width:100%;">
            <span class="material-symbols-outlined" style="color:var(--text-muted);">search</span>
            <input type="text" class="form-control" id="searchInput" placeholder="Search by name, code or phone...">
          </div>
          <button class="btn btn-gradient ripple" data-bs-toggle="modal" data-bs-target="#memberModal" onclick="openCreateModal()">
            <span class="material-symbols-outlined align-middle" style="font-size:18px;">add</span> Add Member
          </button>
        </div>

        <div class="table-responsive">
          <table class="table-modern">
            <thead>
              <tr><th>Member</th><th>Code</th><th>Phone</th><th>Plan</th><th>Expiry</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="membersBody">
              <tr><td colspan="7"><div class="skeleton" style="height:20px;"></div></td></tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
          <span style="font-size:0.82rem; color:var(--text-secondary);" id="pageInfo"></span>
          <div class="d-flex gap-2">
            <button class="btn btn-ghost btn-sm ripple" id="prevPageBtn">Previous</button>
            <button class="btn btn-ghost btn-sm ripple" id="nextPageBtn">Next</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit Member Modal -->
<div class="modal fade" id="memberModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="memberModalTitle" style="font-weight:600;">Add Member</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="memberForm">
        <div class="modal-body">
          <input type="hidden" id="memberId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full name</label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" id="age" min="10" max="100" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Gender</label>
              <select class="form-select" id="gender">
                <option>Male</option><option>Female</option><option>Other</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone" placeholder="9876543210" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email">
            </div>
            <div class="col-12">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" id="address">
            </div>
            <div class="col-md-6">
              <label class="form-label">Membership plan</label>
              <select class="form-select" id="membershipPlan" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Join date</label>
              <input type="date" class="form-control" id="joinDate">
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-gradient ripple" id="saveMemberBtn">Save Member</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="passwordModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:var(--radius-lg); border:none;">
      <div class="modal-header border-0">
        <h5 class="modal-title" style="font-weight:600;">Reset Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="passwordTargetId">
        <label class="form-label">New password</label>
        <input type="password" class="form-control" id="newPassword" minlength="4" required>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-ghost ripple" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-gradient ripple" id="savePasswordBtn">Save Password</button>
      </div>
    </div>
  </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderLayout('members');

  let currentPage = 0;
  const pageSize = 8;
  let totalPages = 1;
  let searchTimeout = null;
  let plans = [];

  const statusChip = (status) => ({
    ACTIVE: 'chip-active', EXPIRED: 'chip-expired', SUSPENDED: 'chip-suspended', CANCELLED: 'chip-cancelled'
  }[status] || 'chip-cancelled');

  function initials(name) {
    return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  async function loadPlans() {
    try {
      const res = await Api.get('/plans');
      plans = res.data;
      document.getElementById('membershipPlan').innerHTML = plans.map(p =>
        `<option value="${p.id}">${p.planName} (${p.duration} days · ₹${p.price})</option>`).join('');
    } catch (err) {
      Toast.show('Could not load plans', 'error');
    }
  }

  async function loadMembers(keyword) {
    const tbody = document.getElementById('membersBody');
    tbody.innerHTML = '<tr><td colspan="7"><div class="skeleton" style="height:20px;"></div></td></tr>';
    try {
      const path = keyword
        ? `/members/search?keyword=${encodeURIComponent(keyword)}&page=${currentPage}&size=${pageSize}`
        : `/members?page=${currentPage}&size=${pageSize}&sortBy=createdAt&direction=desc`;
      const res = await Api.get(path);
      const data = res.data;
      totalPages = data.totalPages || 1;

      if (!data.content || data.content.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary py-4">No members found</td></tr>';
      } else {
        tbody.innerHTML = data.content.map(m => `
          <tr>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="avatar">${initials(m.name)}</div>
                <div>
                  <div style="font-weight:600;">${m.name}</div>
                  <div style="font-size:0.76rem; color:var(--text-secondary);">${m.email || '—'}</div>
                </div>
              </div>
            </td>
            <td>${m.memberCode}</td>
            <td>${m.phone || '—'}</td>
            <td>${m.membershipPlanName || '—'}</td>
            <td>${m.expiryDate || '—'}</td>
            <td><span class="chip ${statusChip(m.status)}">${m.status}</span></td>
            <td class="text-end">
              <button class="btn btn-ghost btn-sm ripple" onclick='editMember(${JSON.stringify(m)})'>
                <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
              </button>
              <button class="btn btn-ghost btn-sm ripple" onclick="openPasswordModal('${m.id}')">
                <span class="material-symbols-outlined" style="font-size:16px;">lock_reset</span>
              </button>
              <button class="btn btn-ghost btn-sm ripple" onclick="toggleMemberLock('${m.id}', ${m.status === 'SUSPENDED' || m.status === 'EXPIRED'})" title="${(m.status === 'SUSPENDED' || m.status === 'EXPIRED') ? 'Unlock login' : 'Lock login'}">
                <span class="material-symbols-outlined" style="font-size:16px; color:${(m.status === 'SUSPENDED' || m.status === 'EXPIRED') ? 'var(--success)' : 'var(--warning)'};">${(m.status === 'SUSPENDED' || m.status === 'EXPIRED') ? 'lock_open' : 'lock'}</span>
              </button>
              <button class="btn btn-ghost btn-sm ripple" onclick="deleteMember('${m.id}')">
                <span class="material-symbols-outlined" style="font-size:16px; color:var(--danger);">delete</span>
              </button>
            </td>
          </tr>`).join('');
      }

      document.getElementById('pageInfo').textContent = `Page ${currentPage + 1} of ${totalPages} · ${data.totalElements || 0} members`;
      document.getElementById('prevPageBtn').disabled = currentPage === 0;
      document.getElementById('nextPageBtn').disabled = currentPage >= totalPages - 1;
    } catch (err) {
      Toast.show(err.message || 'Failed to load members', 'error');
    }
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { currentPage = 0; loadMembers(e.target.value.trim()); }, 350);
  });

  document.getElementById('prevPageBtn').addEventListener('click', () => {
    if (currentPage > 0) { currentPage--; loadMembers(document.getElementById('searchInput').value.trim()); }
  });
  document.getElementById('nextPageBtn').addEventListener('click', () => {
    if (currentPage < totalPages - 1) { currentPage++; loadMembers(document.getElementById('searchInput').value.trim()); }
  });

  function openCreateModal() {
    document.getElementById('memberModalTitle').textContent = 'Add Member';
    document.getElementById('memberForm').reset();
    document.getElementById('memberId').value = '';
  }

  function editMember(m) {
    document.getElementById('memberModalTitle').textContent = 'Edit Member';
    document.getElementById('memberId').value = m.id;
    document.getElementById('name').value = m.name;
    document.getElementById('age').value = m.age;
    document.getElementById('gender').value = m.gender || 'Male';
    document.getElementById('phone').value = m.phone || '';
    document.getElementById('email').value = m.email || '';
    document.getElementById('address').value = m.address || '';
    document.getElementById('membershipPlan').value = m.membershipPlan || '';
    document.getElementById('joinDate').value = m.joinDate || '';
    new bootstrap.Modal(document.getElementById('memberModal')).show();
  }

  async function deleteMember(id) {
    if (!confirm('Delete this member? This cannot be undone.')) return;
    try {
      await Api.del(`/members/${id}`);
      Toast.show('Member deleted', 'success');
      loadMembers(document.getElementById('searchInput').value.trim());
    } catch (err) {
      Toast.show(err.message || 'Failed to delete member', 'error');
    }
  }

  async function toggleMemberLock(id, isCurrentlyLocked) {
    const action = isCurrentlyLocked ? 'unlock' : 'lock';
    if (!isCurrentlyLocked && !confirm('Lock this member\'s login? They will not be able to sign in until unlocked.')) return;
    try {
      await Api.post(`/members/${id}/${action}`, {});
      Toast.show(isCurrentlyLocked ? 'Member unlocked — they can log in again' : 'Member locked — login disabled', 'success');
      loadMembers(document.getElementById('searchInput').value.trim());
    } catch (err) {
      Toast.show(err.message || `Failed to ${action} member`, 'error');
    }
  }

  function openPasswordModal(id) {
    document.getElementById('passwordTargetId').value = id;
    document.getElementById('newPassword').value = '';
    new bootstrap.Modal(document.getElementById('passwordModal')).show();
  }

  document.getElementById('savePasswordBtn').addEventListener('click', async () => {
    const id = document.getElementById('passwordTargetId').value;
    const password = document.getElementById('newPassword').value.trim();
    if (!password) {
      Toast.show('Enter a password', 'error');
      return;
    }

    try {
      await Api.post(`/members/${id}/reset-password`, { newPassword: password });
      Toast.show('Password reset for member', 'success');
      bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
    } catch (err) {
      Toast.show(err.message || 'Failed to reset password', 'error');
    }
  });

  document.getElementById('memberForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('memberId').value;
    const payload = {
      name: document.getElementById('name').value.trim(),
      age: parseInt(document.getElementById('age').value, 10),
      gender: document.getElementById('gender').value,
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      address: document.getElementById('address').value.trim(),
      membershipPlan: document.getElementById('membershipPlan').value,
      joinDate: document.getElementById('joinDate').value || null
    };

    const btn = document.getElementById('saveMemberBtn');
    btn.disabled = true;
    try {
      if (id) {
        await Api.put(`/members/${id}`, payload);
        Toast.show('Member updated', 'success');
        bootstrap.Modal.getInstance(document.getElementById('memberModal')).hide();
      } else {
        const res = await Api.post('/members', payload);
        bootstrap.Modal.getInstance(document.getElementById('memberModal')).hide();
        showCredentialsModal('Member', res.data.memberCode, res.message);
      }
      loadMembers(document.getElementById('searchInput').value.trim());
    } catch (err) {
      Toast.show(err.message || 'Failed to save member', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  (async function init() {
    await loadPlans();
    await loadMembers();
  })();
</script>
</body>
</html>
